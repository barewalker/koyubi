name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cargo-xwin
        run: cargo install cargo-xwin
      - name: Run engine tests
        run: cargo test -p koyubi-engine
      - name: Verify Windows build
        run: cargo xwin build -p koyubi-tsf --target x86_64-pc-windows-msvc --release

  build-installer:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build Windows binaries
        run: cargo build -p koyubi-tsf -p koyubi-dict --target x86_64-pc-windows-msvc --release
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer
        run: iscc installer\koyubi.iss
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: target/installer/koyubi-*-setup.exe

  release:
    needs: build-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist/
      - name: Compute SHA256
        id: sha256
        run: |
          FILE=$(ls dist/koyubi-*-setup.exe)
          HASH=$(sha256sum "$FILE" | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename $FILE)" >> "$GITHUB_OUTPUT"
          echo "### SHA256" >> notes.md
          echo '```' >> notes.md
          echo "$HASH  $(basename $FILE)" >> notes.md
          echo '```' >> notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/koyubi-*-setup.exe
          body_path: notes.md
          draft: false
